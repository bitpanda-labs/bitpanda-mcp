name: Check uv.lock

on:
  pull_request:
    paths: ["pyproject.toml"]

permissions:
  contents: read

jobs:
  sync:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.6"

      - run: uv lock

      - run: |
          if git diff --quiet -- uv.lock; then
            echo "uv.lock is up to date"
          else
            echo "uv.lock is out of date. Please regenerate and commit uv.lock."
            git --no-pager diff -- uv.lock
            exit 1
          fi
