name: Publish

on:
  release:
    types: [published]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.6"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Test
        run: uv run pytest
        env:
          BITPANDA_API_KEY: test-key

      - name: Security audit
        run: uv run pip-audit

  build:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.6"
          enable-cache: true

      - name: Verify version matches release tag
        run: |
          PKG_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Version mismatch: pyproject.toml=$PKG_VERSION, tag=$TAG"
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
